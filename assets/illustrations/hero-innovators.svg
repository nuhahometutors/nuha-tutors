<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" fill="none" role="img" aria-label="Students learning with global online tutors">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="600" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eef6fc"/>
      <stop offset="0.55" stop-color="#fff8f5"/>
      <stop offset="1" stop-color="#f0f4ff"/>
    </linearGradient>
    <linearGradient id="globeGrad" x1="320" y1="60" x2="480" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4a6fa5"/>
      <stop offset="1" stop-color="#2d4a6e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#e07a5f"/>
      <stop offset="1" stop-color="#f4a261"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="70" y1="150" x2="290" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8f4fc"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#2d4a6e" flood-opacity="0.14"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="480" rx="28" fill="url(#bgGrad)"/>

  <!-- ambient orbs -->
  <circle cx="90" cy="90" r="56" fill="#e07a5f" opacity="0.12"/>
  <circle cx="520" cy="380" r="72" fill="#4a6fa5" opacity="0.1"/>
  <circle cx="460" cy="100" r="40" fill="#f4a261" opacity="0.14"/>

  <!-- connection arcs -->
  <path d="M300 120C360 80 430 90 470 140" stroke="#9bb8d9" stroke-width="2" stroke-dasharray="6 8" opacity="0.7"/>
  <path d="M250 300C180 260 120 220 80 170" stroke="#e07a5f" stroke-width="2" stroke-dasharray="6 8" opacity="0.45"/>
  <path d="M320 340C400 320 470 280 510 220" stroke="#4a6fa5" stroke-width="2" stroke-dasharray="6 8" opacity="0.5"/>

  <!-- globe -->
  <g filter="url(#softShadow)">
    <circle cx="410" cy="150" r="78" fill="url(#globeGrad)"/>
    <ellipse cx="410" cy="150" rx="78" ry="24" fill="#1a2332" opacity="0.08"/>
    <path d="M332 150h156M410 72v156" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
    <path d="M350 110c24-18 48-26 60-26s36 8 60 26M350 190c24 18 48 26 60 26s36-8 60-26" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
    <circle cx="440" cy="130" r="8" fill="#e07a5f"/>
    <circle cx="378" cy="168" r="6" fill="#f4a261"/>
    <circle cx="452" cy="176" r="5" fill="#fff" opacity="0.8"/>
  </g>

  <!-- laptop / online class -->
  <g filter="url(#softShadow)">
    <rect x="68" y="168" width="250" height="168" rx="18" fill="url(#screenGrad)" stroke="#9bb8d9" stroke-width="2"/>
    <rect x="88" y="188" width="210" height="118" rx="10" fill="#2d4a6e"/>
    <rect x="100" y="200" width="88" height="10" rx="5" fill="#fff" opacity="0.22"/>
    <rect x="100" y="220" width="120" height="8" rx="4" fill="#fff" opacity="0.16"/>
    <rect x="100" y="238" width="96" height="8" rx="4" fill="#e07a5f" opacity="0.55"/>
    <circle cx="268" cy="248" r="28" fill="#e07a5f"/>
    <circle cx="268" cy="242" r="10" fill="#fff" opacity="0.9"/>
    <path d="M252 268c8 10 16 14 16 14s8-4 16-14" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <rect x="130" y="336" width="126" height="14" rx="7" fill="#c5d8ec"/>
    <path d="M118 350h150l-18 18H136l-18-18z" fill="#9bb8d9"/>
  </g>

  <!-- student -->
  <g filter="url(#softShadow)">
    <circle cx="150" cy="118" r="34" fill="#f4d3c5"/>
    <path d="M116 118c0-18 15-32 34-32s34 14 34 32" fill="#2d4a6e"/>
    <rect x="108" y="150" width="84" height="44" rx="18" fill="#4a6fa5"/>
    <path d="M92 194c10-8 24-12 58-12s48 4 58 12" stroke="#4a6fa5" stroke-width="16" stroke-linecap="round"/>
  </g>

  <!-- books stack -->
  <g filter="url(#softShadow)">
    <rect x="468" y="286" width="72" height="16" rx="4" fill="#e07a5f"/>
    <rect x="462" y="304" width="80" height="16" rx="4" fill="#4a6fa5"/>
    <rect x="470" y="322" width="64" height="16" rx="4" fill="#2d4a6e"/>
    <rect x="476" y="340" width="52" height="14" rx="4" fill="#f4a261"/>
  </g>

  <!-- lightbulb idea -->
  <g filter="url(#glow)">
    <circle cx="92" cy="332" r="34" fill="#f4a261" opacity="0.22"/>
    <path d="M92 296c16 0 28 12 28 28 0 10-4 18-10 24v14H74v-14c-6-6-10-14-10-24 0-16 12-28 28-28z" fill="url(#accentGrad)"/>
    <rect x="82" y="362" width="20" height="10" rx="4" fill="#e07a5f"/>
    <path d="M86 308h12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- graduation cap badge -->
  <g transform="translate(500 58)">
    <rect x="0" y="18" width="52" height="8" rx="2" fill="#2d4a6e"/>
    <path d="M26 4L4 16l22 12 22-12L26 4z" fill="#2d4a6e"/>
    <path d="M48 16v14" stroke="#e07a5f" stroke-width="2"/>
    <circle cx="48" cy="32" r="4" fill="#e07a5f"/>
  </g>

  <!-- floating stars -->
  <path d="M540 250l4 10 10 4-10 4-4 10-4-10-10-4 10-4 4-10z" fill="#f4a261"/>
  <path d="M48 210l3 7 7 3-7 3-3 7-3-7-7-3 7-3 3-7z" fill="#4a6fa5" opacity="0.7"/>
  <path d="M330 390l3 7 7 3-7 3-3 7-3-7-7-3 7-3 3-7z" fill="#e07a5f" opacity="0.65"/>

  <!-- chart growth card -->
  <g filter="url(#softShadow)">
    <rect x="300" y="300" width="132" height="96" rx="14" fill="#fff" stroke="#9bb8d9" stroke-width="1.5"/>
    <rect x="318" y="352" width="18" height="28" rx="4" fill="#c5d8ec"/>
    <rect x="344" y="334" width="18" height="46" rx="4" fill="#4a6fa5" opacity="0.55"/>
    <rect x="370" y="318" width="18" height="62" rx="4" fill="url(#accentGrad)"/>
    <path d="M318 326h84" stroke="#eef4fa" stroke-width="8" stroke-linecap="round"/>
    <circle cx="396" cy="318" r="10" fill="#e07a5f"/>
    <path d="M392 318l3 3 6-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <ellipse cx="300" cy="452" rx="210" ry="18" fill="#2d4a6e" opacity="0.08"/>
</svg>
